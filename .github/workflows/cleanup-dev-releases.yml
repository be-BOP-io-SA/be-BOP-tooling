name: Clean up dev pre-releases

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Delete dev pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete dev pre-release and tag
        run: gh release delete "dev-pr-${{ github.event.pull_request.number }}" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
